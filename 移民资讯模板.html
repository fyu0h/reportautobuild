<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>国际移民一周资讯 - 定制模板</title>
<script src="https://unpkg.com/docx@9.1.1/build/index.umd.js"></script>
<script src="https://unpkg.com/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --primary: #1a3a5c;
    --primary-light: #2d5f8a;
    --accent: #c0392b;
    --accent-soft: #e74c3c;
    --bg: #f0f4f8;
    --card: #ffffff;
    --border: #d5dde5;
    --text: #2c3e50;
    --text-light: #7f8c9a;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 8px;
  }

  body {
    font-family: 'Noto Sans SC', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ===== HEADER ===== */
  header {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    color: #fff;
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  header .logo .icon {
    width: 32px; height: 32px;
    background: rgba(255,255,255,0.2);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  header .badge {
    background: var(--accent);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
    margin-left: 8px;
  }
  .header-actions {
    display: flex;
    gap: 10px;
  }

  /* ===== BUTTONS ===== */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 18px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn-ghost {
    background: rgba(255,255,255,0.15);
    color: #fff;
    backdrop-filter: blur(4px);
  }
  .btn-ghost:hover { background: rgba(255,255,255,0.25); }
  .btn-accent {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 2px 8px rgba(192,57,43,0.3);
  }
  .btn-accent:hover { background: var(--accent-soft); }
  .btn-outline {
    background: transparent;
    color: var(--primary);
    border: 1.5px solid var(--border);
  }
  .btn-outline:hover { border-color: var(--primary); background: #f8fafc; }
  .btn-sm { padding: 5px 12px; font-size: 13px; }
  .btn-danger { background: #fee; color: #c0392b; border: 1px solid #fcc; }
  .btn-danger:hover { background: #fdd; }
  .btn-add {
    background: #e8f5e9;
    color: #27ae60;
    border: 1px dashed #a5d6a7;
    width: 100%;
    justify-content: center;
    padding: 10px;
    margin-top: 8px;
  }
  .btn-add:hover { background: #c8e6c9; }

  /* ===== MAIN LAYOUT ===== */
  .main {
    flex: 1;
    display: flex;
    gap: 0;
    overflow: hidden;
  }

  /* ===== EDIT PANEL ===== */
  .edit-panel {
    width: 50%;
    overflow-y: auto;
    padding: 20px 24px;
    background: var(--bg);
  }
  .edit-panel::-webkit-scrollbar { width: 6px; }
  .edit-panel::-webkit-scrollbar-thumb { background: #c5cdd5; border-radius: 3px; }

  .section-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 18px 20px;
    margin-bottom: 16px;
    border: 1px solid var(--border);
    transition: border-color 0.2s;
  }
  .section-card:focus-within { border-color: var(--primary-light); }

  .section-card h3 {
    font-size: 14px;
    color: var(--primary);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding-bottom: 10px;
    border-bottom: 1px solid #eef2f5;
  }
  .section-card h3 .tag {
    background: #e3ecf5;
    color: var(--primary);
    font-size: 11px;
    padding: 1px 8px;
    border-radius: 10px;
    font-weight: 500;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-light);
    margin-bottom: 4px;
    margin-top: 10px;
  }
  label:first-child { margin-top: 0; }

  input[type="text"], textarea {
    width: 100%;
    padding: 8px 12px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
    transition: border-color 0.2s;
    background: #fafbfc;
  }
  input[type="text"]:focus, textarea:focus {
    outline: none;
    border-color: var(--primary-light);
    background: #fff;
  }
  textarea { resize: vertical; min-height: 60px; line-height: 1.6; }

  .date-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .date-row input { flex: 1; }
  .date-row span { color: var(--text-light); font-size: 14px; }

  /* News item */
  .news-item {
    background: #fafbfc;
    border: 1px solid #e8ecf0;
    border-radius: 6px;
    padding: 14px;
    margin-top: 10px;
    position: relative;
  }
  .news-item .news-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .news-item .news-num {
    font-weight: 700;
    color: var(--primary);
    font-size: 13px;
  }
  .summary-item {
    background: #fafbfc;
    border: 1px solid #e8ecf0;
    border-radius: 6px;
    padding: 10px 14px;
    margin-top: 8px;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .summary-item .num {
    font-weight: 700;
    color: var(--primary);
    font-size: 13px;
    white-space: nowrap;
  }
  .summary-item input { flex: 1; }
  .summary-item .btn-danger { flex-shrink: 0; }

  /* ===== PREVIEW PANEL ===== */
  .preview-panel {
    width: 50%;
    background: #e2e8ee;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .preview-panel::-webkit-scrollbar { width: 6px; }
  .preview-panel::-webkit-scrollbar-thumb { background: #b5bfc9; border-radius: 3px; }

  .preview-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    color: var(--text-light);
    font-size: 14px;
    font-weight: 500;
    align-self: flex-start;
  }
  .preview-header .dot { width: 8px; height: 8px; background: #27ae60; border-radius: 50%; }

  .a4-page {
    width: 210mm;
    min-height: 297mm;
    background: #fff;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    padding: 2.54cm 3.17cm;
    font-family: "FangSong_GB2312", "仿宋_GB2312", "FangSong", "仿宋", STFangsong, serif;
    font-size: 16pt;
    line-height: 28pt;
    color: #000;
    position: relative;
    margin-bottom: 20px;
  }

  .a4-page .doc-title {
    font-family: "FZXiaoBiaoSong-B05S", "方正小标宋简体", STSong, SimSun, serif;
    font-size: 22pt;
    line-height: 28pt;
    text-align: center;
    font-weight: normal;
    margin-bottom: 0;
  }

  .a4-page .doc-subtitle {
    font-family: "KaiTi_GB2312", "楷体_GB2312", KaiTi, "楷体", STKaiti, serif;
    font-size: 16pt;
    line-height: 28pt;
    text-align: center;
    margin-bottom: 0;
  }

  .a4-page .doc-summary-label {
    font-family: "FangSong_GB2312", "仿宋_GB2312", "FangSong", "仿宋", STFangsong, serif;
    font-size: 16pt;
    line-height: 28pt;
    text-indent: 2em;
    text-align: justify;
  }

  .a4-page .doc-summary-item {
    font-family: "FangSong_GB2312", "仿宋_GB2312", "FangSong", "仿宋", STFangsong, serif;
    font-size: 16pt;
    line-height: 28pt;
    text-indent: 2em;
    text-align: justify;
  }

  .a4-page .doc-section-title {
    font-family: "SimHei", "黑体", STHeiti, sans-serif;
    font-size: 16pt;
    line-height: 28pt;
    text-indent: 2em;
    text-align: justify;
    font-weight: normal;
  }

  .a4-page .doc-news-item {
    font-family: "FangSong_GB2312", "仿宋_GB2312", "FangSong", "仿宋", STFangsong, serif;
    font-size: 16pt;
    line-height: 28pt;
    text-indent: 2em;
    text-align: justify;
  }
  .a4-page .doc-news-item .news-title-bold {
    font-weight: bold;
  }

  .a4-page .page-number {
    position: absolute;
    bottom: 1.75cm;
    left: 0;
    right: 0;
    text-align: center;
    font-family: "Times New Roman", serif;
    font-size: 14pt;
    color: #000;
  }

  .empty-hint {
    color: #bbb;
    font-style: italic;
    font-size: 14pt;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 1200px) {
    .a4-page { width: 100%; min-height: auto; padding: 1.5cm 2cm; }
  }

  /* ===== ANIMATIONS ===== */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .section-card { animation: fadeIn 0.3s ease; }
  .news-item, .summary-item { animation: fadeIn 0.2s ease; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="icon">📋</div>
    国际移民一周资讯
    <span class="badge">定制模板</span>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="loadSample()">📥 载入示例</button>
    <button class="btn btn-ghost" onclick="clearAll()">🗑️ 清空</button>
    <button class="btn btn-accent" onclick="exportWord()">📄 导出 Word</button>
  </div>
</header>

<div class="main">
  <!-- ===== 编辑区 ===== -->
  <div class="edit-panel" id="editPanel">

    <!-- 基本信息 -->
    <div class="section-card">
      <h3>📄 基本信息 <span class="tag">版头</span></h3>
      <label>标题</label>
      <input type="text" id="docTitle" value="皇岗边检站国际移民一周资讯" oninput="render()">
      <label>日期范围</label>
      <div class="date-row">
        <input type="text" id="dateStart" placeholder="X月X日" oninput="render()">
        <span>至</span>
        <input type="text" id="dateEnd" placeholder="X月X日" oninput="render()">
      </div>
    </div>

    <!-- 信息摘要 -->
    <div class="section-card">
      <h3>📋 信息摘要 <span class="tag">摘要</span></h3>
      <div id="summaryList"></div>
      <button class="btn btn-add" onclick="addSummary()">＋ 添加摘要条目</button>
    </div>

    <!-- 章节列表 -->
    <div id="sectionsList"></div>
    <button class="btn btn-add" onclick="addSection()" style="margin-bottom:24px;">＋ 添加章节</button>

  </div>

  <!-- ===== 预览区 ===== -->
  <div class="preview-panel">
    <div class="preview-header">
      <div class="dot"></div>
      实时预览
    </div>
    <div class="a4-page" id="a4Preview"></div>
  </div>
</div>

<script>
// ===== DATA MODEL =====
const data = {
  title: '皇岗边检站国际移民一周资讯',
  dateStart: '',
  dateEnd: '',
  summaries: [],
  sections: []
};

// ===== SUMMARY MANAGEMENT =====
function addSummary(text) {
  data.summaries.push(text || '');
  renderSummaryList();
  render();
}

function removeSummary(idx) {
  data.summaries.splice(idx, 1);
  renderSummaryList();
  render();
}

function updateSummary(idx, val) {
  data.summaries[idx] = val;
  render();
}

function renderSummaryList() {
  const container = document.getElementById('summaryList');
  container.innerHTML = '';
  data.summaries.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'summary-item';
    div.innerHTML = `
      <span class="num">${i+1}.</span>
      <input type="text" value="${escHtml(s)}" placeholder="输入摘要内容（以；结尾）"
             oninput="updateSummary(${i}, this.value)">
      <button class="btn btn-danger btn-sm" onclick="removeSummary(${i})">✕</button>
    `;
    container.appendChild(div);
  });
}

// ===== SECTION MANAGEMENT =====
const CN_NUMS = ['一', '二', '三', '四', '五', '六', '七', '八', '九', '十'];

function addSection(title) {
  data.sections.push({
    title: title || '',
    newsItems: []
  });
  renderSectionsList();
  render();
}

function removeSection(idx) {
  data.sections.splice(idx, 1);
  renderSectionsList();
  render();
}

function updateSectionTitle(idx, val) {
  data.sections[idx].title = val;
  render();
}

function addNewsItem(secIdx, headline, body) {
  data.sections[secIdx].newsItems.push({
    headline: headline || '',
    body: body || ''
  });
  renderSectionsList();
  render();
}

function removeNewsItem(secIdx, newsIdx) {
  data.sections[secIdx].newsItems.splice(newsIdx, 1);
  renderSectionsList();
  render();
}

function updateNewsHeadline(secIdx, newsIdx, val) {
  data.sections[secIdx].newsItems[newsIdx].headline = val;
  render();
}

function updateNewsBody(secIdx, newsIdx, val) {
  data.sections[secIdx].newsItems[newsIdx].body = val;
  render();
}

function renderSectionsList() {
  const container = document.getElementById('sectionsList');
  container.innerHTML = '';
  data.sections.forEach((sec, si) => {
    const card = document.createElement('div');
    card.className = 'section-card';

    // Count all news items before this section for global numbering
    let globalIdx = 0;
    for (let k = 0; k < si; k++) {
      globalIdx += data.sections[k].newsItems.length;
    }

    let newsHtml = '';
    sec.newsItems.forEach((n, ni) => {
      const gNum = globalIdx + ni + 1;
      newsHtml += `
        <div class="news-item">
          <div class="news-header">
            <span class="news-num">第 ${gNum} 条</span>
            <button class="btn btn-danger btn-sm" onclick="removeNewsItem(${si},${ni})">✕ 删除</button>
          </div>
          <label>新闻标题（首句，将加粗）</label>
          <input type="text" value="${escHtml(n.headline)}" placeholder="如：港将公布《香港铁路标准》推湾区应用。"
                 oninput="updateNewsHeadline(${si},${ni},this.value)">
          <label>正文内容</label>
          <textarea rows="3" placeholder="据...X月X日报道，.......。（皇岗边检站）"
                    oninput="updateNewsBody(${si},${ni},this.value)">${escHtml(n.body)}</textarea>
        </div>
      `;
    });

    card.innerHTML = `
      <h3>
        📑 ${CN_NUMS[si] || si+1}、${sec.title || '（未命名章节）'}
        <span class="tag">章节 ${si+1}</span>
        <span style="flex:1"></span>
        <button class="btn btn-danger btn-sm" onclick="removeSection(${si})">✕ 删除章节</button>
      </h3>
      <label>章节标题</label>
      <input type="text" value="${escHtml(sec.title)}" placeholder="如：涉我重要移民动态"
             oninput="updateSectionTitle(${si},this.value)">
      ${newsHtml}
      <button class="btn btn-add" onclick="addNewsItem(${si})">＋ 添加新闻条目</button>
    `;
    container.appendChild(card);
  });
}

// ===== PREVIEW RENDER =====
function render() {
  // Sync data from inputs
  data.title = document.getElementById('docTitle').value;
  data.dateStart = document.getElementById('dateStart').value;
  data.dateEnd = document.getElementById('dateEnd').value;

  const preview = document.getElementById('a4Preview');
  let html = '';

  // Title
  html += `<p class="doc-title">${escHtml(data.title) || '<span class="empty-hint">输入标题</span>'}</p>`;

  // Subtitle
  const dateText = (data.dateStart || data.dateEnd)
    ? `（${data.dateStart || 'X月X日'}至${data.dateEnd || 'X月X日'}）`
    : '（X月X日至X月X日）';
  html += `<p class="doc-subtitle">${escHtml(dateText)}</p>`;

  // Summary
  if (data.summaries.length > 0) {
    html += `<p class="doc-summary-label">【信息摘要】</p>`;
    data.summaries.forEach((s, i) => {
      const text = s || '......';
      const ending = text.endsWith('；') ? '' : '；';
      html += `<p class="doc-summary-item">${i+1}.${escHtml(text)}${ending}</p>`;
    });
  }

  // Sections
  let globalNewsIdx = 0;
  data.sections.forEach((sec, si) => {
    const secNum = CN_NUMS[si] || (si + 1);
    html += `<p class="doc-section-title">${secNum}、${escHtml(sec.title) || '......'}</p>`;

    sec.newsItems.forEach((n, ni) => {
      globalNewsIdx++;
      const headline = n.headline || '......。';
      const body = n.body || '';
      html += `<p class="doc-news-item"><span class="news-title-bold">${globalNewsIdx}.${escHtml(headline)}</span>${escHtml(body)}</p>`;
    });
  });

  // Page number
  html += `<div class="page-number">— 1 —</div>`;

  preview.innerHTML = html;
}

// ===== EXPORT WORD =====
async function exportWord() {
  const { Document, Packer, Paragraph, TextRun, AlignmentType, HeadingLevel, TabStopPosition, convertMillimetersToTwip } = docx;

  const children = [];

  const LINE_SPACING = { line: 560, lineRule: 'exact' }; // 28pt fixed = 560 half-pt

  // Title
  children.push(new Paragraph({
    alignment: AlignmentType.CENTER,
    spacing: LINE_SPACING,
    children: [new TextRun({
      text: data.title || '皇岗边检站国际移民一周资讯',
      font: { eastAsia: '方正小标宋简体', ascii: 'Times New Roman', hAnsi: 'Times New Roman' },
      size: 44, // 22pt = 44 half-pt
      bold: false,
      color: '000000',
    })],
  }));

  // Subtitle
  const dateText = `（${data.dateStart || 'X月X日'}至${data.dateEnd || 'X月X日'}）`;
  children.push(new Paragraph({
    alignment: AlignmentType.CENTER,
    spacing: LINE_SPACING,
    children: [new TextRun({
      text: dateText,
      font: { eastAsia: '楷体_GB2312', ascii: 'Times New Roman', hAnsi: 'Times New Roman' },
      size: 32, // 16pt
      bold: false,
      color: '000000',
    })],
  }));

  // Common font
  const fsFont = { eastAsia: '仿宋_GB2312', ascii: 'Times New Roman', hAnsi: 'Times New Roman' };
  const htFont = { eastAsia: '黑体', ascii: '黑体', hAnsi: '黑体' };
  const indent = { firstLine: convertMillimetersToTwip(11.3) }; // ~2 chars

  // Summary
  if (data.summaries.length > 0) {
    children.push(new Paragraph({
      alignment: AlignmentType.JUSTIFIED,
      spacing: LINE_SPACING,
      indent,
      children: [new TextRun({
        text: '【信息摘要】',
        font: fsFont, size: 32, color: '000000',
      })],
    }));

    data.summaries.forEach((s, i) => {
      let text = s || '......';
      if (!text.endsWith('；')) text += '；';
      children.push(new Paragraph({
        alignment: AlignmentType.JUSTIFIED,
        spacing: LINE_SPACING,
        indent,
        children: [new TextRun({
          text: `${i + 1}.${text}`,
          font: fsFont, size: 32, color: '000000',
        })],
      }));
    });
  }

  // Sections
  let globalNewsIdx = 0;
  data.sections.forEach((sec, si) => {
    const secNum = CN_NUMS[si] || (si + 1);
    children.push(new Paragraph({
      alignment: AlignmentType.JUSTIFIED,
      spacing: LINE_SPACING,
      indent,
      children: [new TextRun({
        text: `${secNum}、${sec.title || '......'}`,
        font: htFont, size: 32, color: '000000',
      })],
    }));

    sec.newsItems.forEach((n) => {
      globalNewsIdx++;
      const headline = n.headline || '......。';
      const body = n.body || '';
      const runs = [
        new TextRun({
          text: `${globalNewsIdx}.${headline}`,
          font: fsFont, size: 32, bold: true, color: '000000',
        }),
      ];
      if (body) {
        runs.push(new TextRun({
          text: body,
          font: fsFont, size: 32, bold: false, color: '000000',
        }));
      }
      children.push(new Paragraph({
        alignment: AlignmentType.JUSTIFIED,
        spacing: LINE_SPACING,
        indent,
        children: runs,
      }));
    });
  });

  const doc = new Document({
    sections: [{
      properties: {
        page: {
          size: {
            width: convertMillimetersToTwip(210),
            height: convertMillimetersToTwip(297),
          },
          margin: {
            top: convertMillimetersToTwip(25.4),
            bottom: convertMillimetersToTwip(25.4),
            left: convertMillimetersToTwip(31.7),
            right: convertMillimetersToTwip(31.7),
            header: convertMillimetersToTwip(15),
            footer: convertMillimetersToTwip(17.5),
          },
        },
      },
      children,
    }],
  });

  const blob = await Packer.toBlob(doc);
  const fname = `国际移民一周资讯_${data.dateStart || ''}至${data.dateEnd || ''}.docx`.replace(/\s/g, '');
  saveAs(blob, fname);
}
